name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm test --if-present
      - run: npm run build
      - name: Verify openapi.json is up to date
        run: |
          npm run openapi:dump -- --out=openapi.json
          if ! git diff --quiet -- openapi.json; then
            echo "::error::openapi.json is stale. Run 'npm run openapi:dump' and commit the result."
            git --no-pager diff -- openapi.json
            exit 1
          fi

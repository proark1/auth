# Railway service config — auth-service
# Postgres + Redis are provisioned as separate Railway plugins in the same project.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/server.js"
# /readyz fails (503) until the DB is reachable, so Railway won't promote
# a fresh container into rotation while its connection pool is still warming.
# /healthz is the simpler "process alive" check; use that if you want
# liveness-only behaviour.
healthcheckPath = "/readyz"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Migrations: run on deploy. Prisma needs DATABASE_URL at this point.
preDeployCommand = "npx prisma migrate deploy"
